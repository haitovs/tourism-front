{# Site B sponsors section: single carousel for all sponsors #}
<section id="sponsors" class="sb-sponsors max-w-[var(--container)] mx-auto px-4 py-14 space-y-8">
    <!-- stacked header cards -->
    <header class="sb-sp-head relative isolation-isolate">
        <div class="sb-stack">
            <div class="sb-rect sb-rect--back"></div>
            <div class="sb-rect sb-rect--front">
                <h2 class="sb-sp-title">{{ t('siteb.sponsors.headline') }}</h2>
                <p class="sb-sp-body">{{ t('siteb.sponsors.body') }}</p>
            </div>
        </div>
    </header>

    <!-- Single carousel for all sponsors -->
    <div class="relative z-0">
        {% with data=all_sponsors %}{% include themed('index/_sponsors_carousel.html') %}{% endwith %}
    </div>
</section>
